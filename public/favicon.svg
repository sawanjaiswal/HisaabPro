<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f7a7e"/>
      <stop offset="100%" stop-color="#0f3638"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dce94e"/>
      <stop offset="100%" stop-color="#c5d226"/>
    </linearGradient>
  </defs>

  <!-- Squircle background — smoother than rx, closer to iOS/Android icon shape -->
  <path d="M256,0 C384,0 512,0 512,128 L512,384 C512,512 384,512 256,512 L256,512 C128,512 0,512 0,384 L0,128 C0,0 128,0 256,0Z" fill="url(#bg)"/>

  <!-- Geometric "H" monogram — two pillars + integrated crossbar
       The crossbar has a slight upward offset (y=224) for visual energy
       Rounded ends give it a modern, approachable feel -->

  <!-- Left pillar -->
  <rect x="120" y="112" width="64" height="288" rx="32" fill="white" opacity="0.95"/>

  <!-- Right pillar -->
  <rect x="328" y="112" width="64" height="288" rx="32" fill="white" opacity="0.95"/>

  <!-- Crossbar — connects the pillars, offset upward for dynamism -->
  <rect x="152" y="224" width="208" height="56" rx="28" fill="white" opacity="0.95"/>

  <!-- Lime accent bar — sits just above the crossbar as a "rupee stroke"
       This is the signature element: turns the H into an H₹ hybrid
       Also acts as the color accent that ties to the brand lime -->
  <rect x="152" y="180" width="144" height="14" rx="7" fill="url(#lime)"/>

  <!-- Subtle second lime stroke — completes the ₹ suggestion (two horizontal lines) -->
  <rect x="152" y="200" width="108" height="10" rx="5" fill="url(#lime)" opacity="0.6"/>
</svg>
