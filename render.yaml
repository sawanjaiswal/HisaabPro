# Render Blueprint — HisaabPro Backend
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: hisaabpro-api
    runtime: node
    plan: free
    region: singapore  # Closest to India

    # Server lives in server/ subdirectory of the monorepo
    rootDir: server

    # Build: install deps, generate Prisma client, run migrations.
    # We intentionally skip `tsc` here — the server has accumulated type
    # errors that are non-blocking at runtime but would fail a strict compile.
    # Running via tsx (same tool used in dev) avoids the compile step entirely.
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy

    # Start directly with tsx (runtime TypeScript execution)
    startCommand: npm run start:prod

    # Health check — Express serves GET /api/health
    healthCheckPath: /api/health

    # Auto-deploy on push to main
    autoDeploy: true

    # Environment variables — set actual values in Render dashboard
    envVars:
      # Database (Neon PostgreSQL)
      - key: DATABASE_URL
        sync: false  # Pooled connection (for app runtime)
      - key: DIRECT_DATABASE_URL
        sync: false  # Direct connection (for migrations)

      # Auth — JWT
      - key: JWT_SECRET
        generateValue: true  # Render generates a random 256-bit secret
      - key: JWT_REFRESH_SECRET
        generateValue: true

      # App config
      # NODE_ENV=production ensures SameSite=None cookies for cross-origin (app.hisaabpro.in → api.hisaabpro.in).
      # ALLOW_DEV_LOGIN=true keeps admin/admin123 devLogin active during closed testing.
      # Set ALLOW_DEV_LOGIN=false (or remove) before public launch.
      - key: NODE_ENV
        value: production
      - key: ALLOW_DEV_LOGIN
        value: "true"
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        value: https://localhost,capacitor://localhost,http://localhost:3000,http://localhost:5173

      # Encryption (for sensitive fields at rest)
      - key: ENCRYPTION_KEY
        generateValue: true

      # Logging
      - key: LOG_LEVEL
        value: info

      # NOTE: Optional integrations (Razorpay, Resend, AISensy, MSG91,
      # Turnstile, Redis, referral config) are intentionally omitted
      # from this blueprint. Add them via the Render dashboard later
      # when you wire those features. Missing values will log warnings
      # but will not crash the server.
