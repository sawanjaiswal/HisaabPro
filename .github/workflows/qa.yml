name: QA

on:
  pull_request:
    branches: [master, main, hisaabpro]
  push:
    branches: [master, main, hisaabpro]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck + Offline patterns + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Offline patterns (ratcheted)
        run: node scripts/enforce-offline.mjs

      - name: Build
        run: npm run build

      - name: Upload dist for Lighthouse
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  lighthouse:
    name: Lighthouse (mobile, throttled)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 14
